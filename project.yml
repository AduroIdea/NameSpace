name: NameSpace
options:
  bundleIdPrefix: com.ivanhofer
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.ivanhofer.NameSpace
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  NameSpace:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: NameSpace
        excludes:
          - "Info.plist"
          - "NameSpace.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ivanhofer.NameSpace
        PRODUCT_NAME: NameSpace
        INFOPLIST_FILE: NameSpace/Info.plist
        CODE_SIGN_ENTITLEMENTS: NameSpace/NameSpace.entitlements
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: NameSpace/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: NameSpace
        CFBundleDisplayName: NameSpace
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSAccessibilityUsageDescription: "NameSpace needs accessibility access to switch between desktops using keyboard shortcuts."
        NSAppleEventsUsageDescription: "NameSpace uses accessibility features to switch between desktops."
    entitlements:
      path: NameSpace/NameSpace.entitlements
      properties:
        com.apple.security.automation.apple-events: true
    scheme:
      testTargets: []
